<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #efd6ac; }
    .ticker-container {
      width: 100vw;
      height: 40px;
      display: flex;
      align-items: center;
      background-color: #efd6ac;
      color: #000000;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }
    .ticker-text {
      display: inline-block;
      position: absolute;
      /* Animación de 40s suave */
      animation: ticker 40s linear infinite;
    }
    @keyframes ticker {
      0% { left: -100%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="ticker-container">
    <div class="ticker-text">
      Compromiso Indumil: Garantizando la excelencia técnica y la seguridad. &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; Planta de Mantenimiento Industrial FAGECOR.
    </div>
  </div>
</body>
</html>
