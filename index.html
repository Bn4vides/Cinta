<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; padding: 0; background-color: transparent; }
    
    /* Contenedor principal con efecto de "marco" amarillo */
    .ticker-wrapper {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 95%;
      height: 80px;
      display: flex;
      align-items: center;
      border-left: 10px solid #f39c12; /* Barra amarilla izquierda */
      background: transparent;
    }

    .content-box {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #f39c12; /* Borde derecho */
      border-top: 2px solid #f39c12;   /* Borde superior */
      border-bottom: 2px solid #f39c12; /* Borde inferior */
    }

    /* Parte superior: Blanco */
    .header-bar {
      background-color: #ffffff;
      padding: 5px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title { font-family: sans-serif; font-weight: 800; font-size: 22px; color: #000; }
    .live-badge { background: #f39c12; color: #000; font-weight: bold; padding: 2px 10px; font-size: 14px; }

    /* Parte inferior: Gris oscuro (Aquí va el movimiento) */
    .ticker-bar {
      background-color: #2c3e50;
      color: #ffffff;
      padding: 10px 15px;
      font-family: sans-serif;
      font-size: 16px;
      overflow: hidden;
      white-space: nowrap;
      flex-grow: 1;
    }

    .moving-text {
      display: inline-block;
      animation: move 120s linear infinite;
    }

    @keyframes move {
      0% { transform: translate(100%, 0); }
      100% { transform: translate(-100%, 0); }
    }
  </style>
</head>
<body>

  <div class="ticker-wrapper">
    <div class="content-box">
      <div class="header-bar">
        <div class="title">PROYECTO SENA MASTERCARD</div>
        <div class="live-badge">.LIVE</div>
      </div>
      <div class="ticker-bar">
        <div class="moving-text">
          Estado actual: Automatización CNC y optimización de flujos de trabajo en FAGECOR. | Calidad, precisión y eficiencia en cada componente producido. | Gestión de mantenimiento industrial activa.
        </div>
      </div>
    </div>
  </div>

</body>
</html>
